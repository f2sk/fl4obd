<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FL4 OBD LOG VIEWER</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:     #0a1520;
      --card:   #112233;
      --border: #1a3050;
      --accent: #00ffcc;
      --text:   #c0d8f0;
      --muted:  #607090;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', monospace;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 0.9rem;
      letter-spacing: 2px;
      color: var(--accent);
    }
    #changeFileBtn {
      display: none;
      margin-left: auto;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      background: transparent;
    }
    #changeFileBtn:hover { color: var(--text); border-color: var(--muted); }

    /* Drop zone */
    #dropZone {
      max-width: 480px;
      margin: 60px auto;
      padding: 60px 20px;
      text-align: center;
      border: 2px dashed var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #dropZone:hover,
    #dropZone.drag { border-color: var(--accent); background: rgba(0,255,204,0.03); }
    #dropZone h2  { font-size: 1rem; margin-bottom: 8px; }
    #dropZone p   { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    #fileInput    { display: none; }

    /* Charts area */
    #charts {
      display: none;
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }
    #fileInfo {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 4px 0 16px;
    }
    #fileInfo span b { color: var(--text); }

    /* Chart card */
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 14px;
    }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .chart-title {
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      color: var(--muted);
    }
    .chart-toggles { display: flex; gap: 6px; flex-wrap: wrap; }
    .toggle-btn {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid currentColor;
      background: transparent;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .toggle-btn.off { opacity: 0.3; }

    /* Tabs */
    #tabBar { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab-btn {
      flex: 1; padding: 9px 0; font-size: 0.8rem; letter-spacing: 1.5px;
      color: var(--muted); background: transparent;
      border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
    }
    .tab-btn.active { color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight: bold; }
    .tab-btn:disabled { opacity: 0.3; cursor: default; }
    .hint { font-size: 0.7rem; color: var(--muted); margin-bottom: 10px; text-align: center; }

    /* Flow playback */
    #flowSvg {
      display: block; width: 100%; max-width: 340px; height: auto;
      margin: 4px auto 0; background: #0a1520; border-radius: 10px;
    }
    .flow-ctrl {
      display: flex; align-items: center; gap: 10px;
      margin: 0 auto; max-width: 340px;
      position: sticky; top: 0; z-index: 5;
      background: var(--card); padding: 8px 0;
    }
    .flow-ctrl button {
      font-size: 1rem; width: 42px; height: 34px; flex: 0 0 auto;
      border: 1px solid var(--border); background: transparent;
      color: var(--accent); border-radius: 6px; cursor: pointer;
    }
    .flow-ctrl button:hover { border-color: var(--accent); }
    .flow-ctrl input[type=range] { flex: 1; accent-color: var(--accent); min-width: 0; }
    .flow-ctrl select {
      flex: 0 0 auto; background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 6px; font-size: 0.78rem; cursor: pointer;
    }
    #flowStat { font-size: 0.7rem; color: var(--muted); font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

<header>
  <h1>FL4 OBD LOG VIEWER</h1>
  <button id="changeFileBtn">ファイル変更</button>
</header>

<div id="dropZone">
  <h2>ログファイルをドロップ</h2>
  <p>または クリックしてファイルを選択</p>
  <p style="margin-top:12px">データログ: fl4obd_data_*.csv</p>
  <p>デバッグログ: fl4obd_*.txt</p>
</div>
<input type="file" id="fileInput" accept=".txt,.csv,text/plain,text/csv">

<div id="charts">
  <div id="fileInfo"></div>

  <div id="tabBar">
    <button class="tab-btn active" data-tab="graphs">GRAPHS</button>
    <button class="tab-btn" data-tab="flow" id="tabBtnFlow">FLOW</button>
  </div>

  <!-- FLOW タブ -->
  <div id="tabFlow" class="tab-pane" style="display:none">
    <div class="chart-card" id="cardFlow">
      <div class="chart-header">
        <span class="chart-title">FLOW PLAYBACK</span>
        <span id="flowStat"></span>
      </div>
      <div class="flow-ctrl">
        <button id="flowPlay" title="再生/一時停止">▶</button>
        <input type="range" id="flowSeek" min="0" max="100" value="0" step="0.001">
        <select id="flowSpeed" title="再生速度">
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
          <option value="8">8×</option>
          <option value="16">16×</option>
        </select>
      </div>
      <svg id="flowSvg" viewBox="0 0 380 600"></svg>
    </div>
  </div>

  <!-- GRAPHS タブ -->
  <div id="tabGraphs" class="tab-pane">
    <p class="hint" id="scrubHint">▸ グラフをドラッグすると、その時刻へ FLOW が同期します</p>

    <div class="chart-card" id="cardVehicle">
      <div class="chart-header">
        <span class="chart-title">VEHICLE</span>
        <div class="chart-toggles" id="togVehicle"></div>
      </div>
      <canvas id="cVehicle"></canvas>
    </div>

    <div class="chart-card" id="cardBattery">
      <div class="chart-header">
        <span class="chart-title">BATTERY</span>
        <div class="chart-toggles" id="togBattery"></div>
      </div>
      <canvas id="cBattery"></canvas>
    </div>

    <div class="chart-card" id="cardPower" style="display:none">
      <div class="chart-header">
        <span class="chart-title">POWER (2920)</span>
        <div class="chart-toggles" id="togPower"></div>
      </div>
      <canvas id="cPower"></canvas>
    </div>

    <div class="chart-card" id="cardTemp" style="display:none">
      <div class="chart-header">
        <span class="chart-title">TEMPERATURE</span>
        <div class="chart-toggles" id="togTemp"></div>
      </div>
      <canvas id="cTemp"></canvas>
    </div>

    <div class="chart-card" id="cardSysv" style="display:none">
      <div class="chart-header">
        <span class="chart-title">SYSTEM VOLTAGE (12V)</span>
        <div class="chart-toggles" id="togSysv"></div>
      </div>
      <canvas id="cSysv"></canvas>
    </div>
  </div>
</div>

<script>
const charts = {};

/* ══ フロー再生（index.html のフロー図を移植）════════════════════ */
const D = {};
const MODE_LABELS = { 20:'EV', 40:'SERIES', 50:'DIRECT', 70:'DIRECT', 60:'TRANS', 30:'TRANS', 10:'TRANS' };
const GEN_TRQ_NM = 0.02 / 0.535;
const GEN_PWR_COEF = GEN_TRQ_NM * (2*Math.PI/60) / 1000;
const FNS = 'http://www.w3.org/2000/svg';
function fEl(tag,attrs,parent){const e=document.createElementNS(FNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);if(parent)parent.appendChild(e);return e;}
const FX_M='#ff9a44', FX_E='#00e5ff', FX_R='#25e0a0', FX_A='#c9a0ff';
const fWX=190,fWY=58, fEX=20,fEY=185, fTX=142,fTY=185, fGX=20,fGY=390, fJX=190,fJY=418, fBX=142,fBY=512, fAX=264,fAY=390, fBW=96,fBH=56;
function fDefs(svg){
  const d=fEl('defs',{},svg);
  for(const [id,c] of [['fah_mech',FX_M],['fah_elec',FX_E],['fah_regen',FX_R],['fah_aux',FX_A]]){
    const m=fEl('marker',{id,markerWidth:2.6,markerHeight:2.4,refX:2.3,refY:1.2,orient:'auto',markerUnits:'strokeWidth'},d);
    fEl('path',{d:'M0 0 L2.6 1.2 L0 2.4 Z',fill:c},m);
  }
}
function fArrow(svg,pts,kind,active,kw,lx,ly,col,anchor){
  const color = col || (kind==='mech'?FX_M:kind==='elec'?FX_E:kind==='aux'?FX_A:FX_R);
  const mk = {[FX_M]:'fah_mech',[FX_E]:'fah_elec',[FX_R]:'fah_regen',[FX_A]:'fah_aux'}[color]||'fah_elec';
  const mag = (kw!=null)?Math.abs(kw):0;
  const w = active ? Math.max(3.6, Math.min(2.4+mag*0.18,15)) : 2.6;
  const d = pts.map((p,i)=>(i?'L':'M')+p[0]+' '+p[1]).join(' ');
  fEl('path',{d,fill:'none',stroke:color,'stroke-width':w,'stroke-linecap':'round','stroke-linejoin':'round','marker-end':'url(#'+mk+')',opacity:active?1:0.15},svg);
  if(kw!=null){const t=fEl('text',{x:lx,y:ly,'text-anchor':anchor||'middle','font-size':28,'font-weight':'bold','font-family':'Courier New',fill:color,opacity:active?1:0.15},svg);t.textContent=kw.toFixed(1);}
}
function fNode(svg,x,y,label,sub,on,hot,subcol){
  const g=fEl('g',{opacity:on?1:0.45},svg);
  fEl('rect',{x,y,width:fBW,height:fBH,rx:7,fill:'#111a24',stroke:on?'#4a6a80':'#2a3a4a','stroke-width':1.6},g);
  fEl('text',{x:x+fBW/2,y:y+(hot?24:31),'text-anchor':'middle','font-size':19,'font-weight':'bold','font-family':'Courier New',fill:'#dfefff'},g).textContent=label;
  fEl('text',{x:x+fBW/2,y:y+46,'text-anchor':'middle','font-size':hot?19:10,'font-family':'Courier New','font-weight':hot?'bold':'normal',fill:hot?(subcol||'#9fe8ff'):'#5a7a90'},g).textContent=sub;
}
function fWheel(svg,x,y,on,spd){
  const g=fEl('g',{opacity:on?1:0.45},svg);
  fEl('circle',{cx:x,cy:y,r:20,fill:'none',stroke:'#889','stroke-width':3.5},g);
  fEl('circle',{cx:x,cy:y,r:5,fill:'#889'},g);
  fEl('text',{x:x-32,y:y+6,'text-anchor':'end','font-size':11,fill:'#889'},g).textContent='車輪';
  if(spd!=null&&!isNaN(spd)){fEl('text',{x:x+30,y:y+8,'text-anchor':'start','font-size':24,'font-weight':'bold','font-family':'Courier New',fill:'#9fe8ff'},svg).textContent=Math.round(spd)+' km/h';}
}
let stableMode = -1;
function updateStableMode(m){
  if(m===20||m===40||m===50||m===70) stableMode=m;
  else if(m===10 && stableMode===20) stableMode=40;
  else if(m===30 && (stableMode===40||stableMode===50||stableMode===70)) stableMode=20;
  return stableMode;
}
function drawFlow(){
  const svg=document.getElementById('flowSvg');
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  fDefs(svg);
  const mode=(D.dispMode>=0)?D.dispMode:D.runMode;
  const modeLabel=(mode>=0&&MODE_LABELS[mode])?MODE_LABELS[mode]:'--';
  const isDirect=(mode===50||mode===70), isSeries=(mode===40);
  const peng=D.peng||0, pgen=D.pgen||0, pbat=D.pbat||0, pdrive=D.pdrive||0;
  const regen = pdrive < -0.1;
  const on=(v)=>Math.abs(v)>0.1;
  const genGen = pgen > 0.1;
  const genMot = pgen < -0.1;
  const genMag = Math.abs(pgen);
  const dump = regen && genMot && D.soc >= 85;
  let trcWheel, busTrc;
  const engWheel = isDirect ? peng : 0;
  if(regen)        { trcWheel=-pdrive; busTrc=-pdrive; }
  else if(isDirect){ trcWheel=Math.max(0,pdrive-peng); busTrc=trcWheel; }
  else             { trcWheel=pdrive; busTrc=pdrive; }
  const engGen = genGen ? peng : genMag;
  const genBus = genMag;
  const aux = Math.max(0, (regen?busTrc:-busTrc) + (genGen?genMag:(genMot?-genMag:0)) + pbat);
  const batBus=-pbat;
  fArrow(svg,[[fEX+fBW/2,fEY],[fEX+fBW/2,fWY],[fWX-24,fWY]],'mech',on(engWheel),on(engWheel)?engWheel:null,128,140);
  if(regen) fArrow(svg,[[fTX+fBW/2,fWY+24],[fTX+fBW/2,fTY]],'mech',on(trcWheel),on(trcWheel)?trcWheel:null,286,140,FX_R,'end');
  else      fArrow(svg,[[fTX+fBW/2,fTY],[fTX+fBW/2,fWY+24]],'mech',on(trcWheel),on(trcWheel)?trcWheel:null,286,140,FX_M,'end');
  if(genMot) fArrow(svg,[[fEX+fBW/2,fGY],[fEX+fBW/2,fEY+fBH]],'mech',on(engGen),on(engGen)?engGen:null,128,326,dump?FX_R:FX_M);
  else       fArrow(svg,[[fEX+fBW/2,fEY+fBH],[fEX+fBW/2,fGY]],'mech',on(engGen),on(engGen)?engGen:null,128,326);
  if(genMot) fArrow(svg,[[fJX-9,fJY],[fGX+fBW,fGY+fBH/2]],'elec',on(genBus),on(genBus)?genBus:null,132,378,dump?FX_R:null);
  else       fArrow(svg,[[fGX+fBW,fGY+fBH/2],[fJX-9,fJY]],'elec',on(genBus),on(genBus)?genBus:null,132,378);
  if(regen) fArrow(svg,[[fJX,fTY+fBH],[fJX,fJY-9]],'elec',on(busTrc),on(busTrc)?busTrc:null,286,326,FX_R,'end');
  else      fArrow(svg,[[fJX,fJY-9],[fJX,fTY+fBH]],'elec',on(busTrc),on(busTrc)?busTrc:null,286,326,null,'end');
  if(batBus>=0) fArrow(svg,[[fJX,fJY+9],[fBX+fBW/2,fBY]],'elec',on(batBus),on(batBus)?batBus:null,286,470,regen?FX_R:FX_E,'end');
  else          fArrow(svg,[[fBX+fBW/2,fBY],[fJX,fJY+9]],'elec',on(batBus),on(batBus)?-batBus:null,286,470,null,'end');
  fArrow(svg,[[fJX+9,fJY],[fAX,fAY+fBH/2]],'aux',on(aux),on(aux)?aux:null,286,378,null,'end');
  fEl('circle',{cx:fJX,cy:fJY,r:8,fill:'#0a0e14',stroke:FX_E,'stroke-width':2.5},svg);
  fEl('circle',{cx:fJX,cy:fJY,r:3,fill:FX_E},svg);
  fNode(svg,fEX,fEY,'ENG',(Math.round(D.engRot)||0)+' rpm',on(peng)||genMot,true);
  fNode(svg,fTX,fTY,'MOT','P_mot',on(pdrive));
  fNode(svg,fGX,fGY,'GEN','P_gen',on(pgen));
  if(dump) fEl('text',{x:fEX+fBW/2,y:fEY-8,'text-anchor':'middle','font-size':14,'font-weight':'bold','font-family':'Courier New',fill:'#ff5544'},svg).textContent='廃電';
  fNode(svg,fBX,fBY,'BAT',isNaN(D.soc)?'SOC --':'SOC '+D.soc.toFixed(0)+'%',true,true);
  fNode(svg,fAX,fAY,'AUX/AC',on(aux)?aux.toFixed(1)+'kW':'--',on(aux),true,FX_A);
  fWheel(svg,fWX,fWY,on(trcWheel)||on(engWheel),D.vsp);
  const mc={EV:FX_E,SERIES:FX_E,DIRECT:FX_M}[modeLabel]||'#cfe';
  fEl('text',{x:312,y:fEY+8,'text-anchor':'middle','font-size':12,'font-family':'Courier New',fill:'#5a7a90','letter-spacing':2},svg).textContent='MODE';
  fEl('text',{x:312,y:fEY+38,'text-anchor':'middle','font-size':26,'font-weight':'bold','font-family':'Courier New',fill:mc},svg).textContent=modeLabel;
}

/* ── 2920 マルチフレーム再構成 + フィールド算出 ───────────── */
// ログ行の受信部 "0:6229.. 1:.. .. 1563.." を結合(10-15はコロン無し)
function reassemble2920(rxRaw){
  const frames={};
  for(const tok of rxRaw.trim().split(/\s+/)){
    let m;
    if((m=tok.match(/^(\d):([0-9A-F]+)$/i)))            frames[+m[1]]=m[2];
    else if((m=tok.match(/^(1[0-5])([0-9A-F]{14})$/i))) frames[+m[1]]=m[2];
  }
  let full=''; for(let i=0;i<=15;i++) if(frames[i]!==undefined) full+=frames[i];
  return full;
}
function compute2920(full){
  if(full.length < 204) return null;
  const u16=i=>parseInt(full.substr(i*2,4),16);
  const s16=i=>{const v=u16(i);return v>=0x8000?v-0x10000:v;};
  const u8 =i=>parseInt(full.substr(i*2,2),16);
  const vsp=u8(15), engRpm=u16(100)/4, mode=u8(79);
  const engTrq=s16(96), drvTrq=s16(90), genTrq=s16(92);
  return {
    vsp, engRpm, mode,
    pbat:   s16(86)*0.0100,
    peng:   2.09e-6 * engTrq * engRpm,
    pgen:   GEN_PWR_COEF * (-genTrq) * engRpm,
    pdrive: 0.000147 * drvTrq * vsp,
  };
}

/* ── 再生コントローラ ─────────────────────────────────────── */
const FL = { frames: [], t0: 0, t1: 0, vt: 0, playing: false, speed: 1, lastNow: 0, raf: 0 };
function frameIdxAt(t){
  const f=FL.frames; if(!f.length) return -1;
  let lo=0,hi=f.length-1,ans=0;
  while(lo<=hi){const m=(lo+hi)>>1; if(f[m].t<=t){ans=m;lo=m+1;}else hi=m-1;}
  return ans;
}
function flowRenderAt(t){
  const i=frameIdxAt(t); if(i<0) return;
  const fr=FL.frames[i];
  D.vsp=fr.vsp; D.engRot=fr.engRpm; D.runMode=fr.mode; D.dispMode=fr.dispMode;
  D.peng=fr.peng; D.pgen=fr.pgen; D.pdrive=fr.pdrive; D.pbat=fr.pbat; D.soc=fr.soc;
  drawFlow();
  window.__cur = t;
  for(const k in charts) charts[k].draw();
  const lbl=(fr.dispMode>=0&&MODE_LABELS[fr.dispMode])?MODE_LABELS[fr.dispMode]:'--';
  document.getElementById('flowStat').textContent =
    `t=${t.toFixed(1)}s  ${i+1}/${FL.frames.length}  ${lbl}`;
}
function flowStep(now){
  if(!FL.playing) return;
  const dt=(now-FL.lastNow)/1000; FL.lastNow=now;
  FL.vt += dt*FL.speed;
  if(FL.vt>=FL.t1){ FL.vt=FL.t1; flowPause(); }
  document.getElementById('flowSeek').value=FL.vt;
  flowRenderAt(FL.vt);
  if(FL.playing) FL.raf=requestAnimationFrame(flowStep);
}
function flowPlay(){
  if(!FL.frames.length) return;
  if(FL.vt>=FL.t1) FL.vt=FL.t0;   // 末尾なら先頭へ
  FL.playing=true; FL.lastNow=performance.now();
  document.getElementById('flowPlay').textContent='⏸';
  FL.raf=requestAnimationFrame(flowStep);
}
function flowPause(){
  FL.playing=false; cancelAnimationFrame(FL.raf);
  document.getElementById('flowPlay').textContent='▶';
}
function flowInit(frames){
  flowPause();
  FL.frames=frames;
  const has=frames.length>0;
  document.getElementById('tabBtnFlow').disabled = !has;
  switchTab('graphs');   // 読み込み後はまずグラフ表示
  if(!has){ window.__cur=null; return; }
  FL.t0=frames[0].t; FL.t1=frames[frames.length-1].t; FL.vt=FL.t0;
  const seek=document.getElementById('flowSeek');
  seek.min=FL.t0; seek.max=FL.t1; seek.value=FL.t0;
  flowRenderAt(FL.t0);
}
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.getElementById('tabGraphs').style.display = name==='graphs'?'block':'none';
  document.getElementById('tabFlow').style.display   = name==='flow'  ?'block':'none';
  if(name==='graphs'){ for(const k in charts){ try{ charts[k].resize(); charts[k].draw(); }catch(_){} } }
  else drawFlow();
}
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{ if(!b.disabled) switchTab(b.dataset.tab); }));
document.getElementById('flowPlay').addEventListener('click',()=>{ FL.playing?flowPause():flowPlay(); });
document.getElementById('flowSpeed').addEventListener('change',e=>{ FL.speed=parseFloat(e.target.value); });
document.getElementById('flowSeek').addEventListener('input',e=>{ flowPause(); FL.vt=parseFloat(e.target.value); flowRenderAt(FL.vt); });

/* 各チャートに再生位置の縦カーソルを描画 */
Chart.register({
  id:'flowCursor',
  afterDraw(chart){
    if(window.__cur==null) return;
    const xs=chart.scales.x; if(!xs) return;
    const px=xs.getPixelForValue(window.__cur);
    const ca=chart.chartArea; if(px<ca.left||px>ca.right) return;
    const c=chart.ctx; c.save();
    c.strokeStyle='rgba(255,255,255,0.6)'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(px,ca.top); c.lineTo(px,ca.bottom); c.stroke();
    c.restore();
  }
});

/* グラフ上をドラッグ → その時刻へフロー図をスクラブ（双方向同期） */
let scrubbing=false;
function scrubFrom(chart,clientX){
  if(!FL.frames.length) return;
  const rect=chart.canvas.getBoundingClientRect();
  let t=chart.scales.x.getValueForPixel(clientX-rect.left);
  t=Math.max(FL.t0,Math.min(FL.t1,t));
  FL.vt=t; document.getElementById('flowSeek').value=t; flowRenderAt(t);
}
['cVehicle','cBattery','cPower','cTemp','cSysv'].forEach(id=>{
  const cv=document.getElementById(id);
  cv.style.touchAction='none';   // モバイルでページスクロールに奪われない
  cv.addEventListener('pointerdown',e=>{
    const ch=Chart.getChart(cv); if(!ch||!FL.frames.length) return;
    scrubbing=true; flowPause();
    try{ cv.setPointerCapture(e.pointerId); }catch(_){}
    scrubFrom(ch,e.clientX);
  });
  cv.addEventListener('pointermove',e=>{ if(scrubbing){ const ch=Chart.getChart(cv); if(ch) scrubFrom(ch,e.clientX); } });
  const end=e=>{ scrubbing=false; try{ cv.releasePointerCapture(e.pointerId); }catch(_){} };
  cv.addEventListener('pointerup',end);
  cv.addEventListener('pointercancel',end);
});

/* ── ファイル入力 ─────────────────────────────────────────── */
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
  fileInput.value = '';
});
document.getElementById('changeFileBtn').addEventListener('click', () => fileInput.click());

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const fmt = detectFormat(text);
    const ds = fmt === 'csv' ? parseCsvLog(text) : parseDebugLog(text);
    render(ds, file.name, fmt);
  };
  reader.readAsText(file);
}

/* ── フォーマット判別 ─────────────────────────────────────── */
function detectFormat(text) {
  const first = text.trimStart().split('\n')[0];
  return first.startsWith('timestamp,') ? 'csv' : 'debug';
}

/* ── CSVデータログパーサ ──────────────────────────────────── */
// 列: timestamp,rpm,speed_kmh,hv_volt_V,hv_curr_A,hv_power_kW,soc_pct,lv_volt_V,eng_temp_C,cat_temp_C,int_temp_C
function parseCsvLog(text) {
  const ds = emptyDs();
  const lines = text.trim().split('\n');
  let t0 = null;

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (cols.length < 8) continue;
    const ts = new Date(cols[0]).getTime();
    if (isNaN(ts)) continue;
    if (t0 === null) t0 = ts;
    const t = (ts - t0) / 1000;

    const push = (arr, v) => { const n = parseFloat(v); if (!isNaN(n)) arr.push({ x: t, y: n }); };
    push(ds.rpm,     cols[1]);
    push(ds.speed,   cols[2]);
    push(ds.vbat,    cols[3]);
    push(ds.ibat,    cols[4]);
    push(ds.pbat,    cols[5]);
    push(ds.soc,     cols[6]);
    push(ds.sysv,    cols[7]);
    push(ds.engTemp, cols[8]);
    push(ds.catTemp, cols[9]);
    push(ds.intTemp, cols[10]);
  }
  return ds;
}

/* ── デバッグログパーサ ───────────────────────────────────── */
function parseDebugLog(text) {
  const ds = emptyDs();
  let startMs = null;
  let lastSoc = NaN;
  stableMode = -1;   // モード遷移ホールドを先頭からやり直し

  function extractMs(line) {
    const m = line.match(/^\[(\d{2}):(\d{2}):(\d{2})\.(\d{3})\]/);
    if (!m) return null;
    return +m[1] * 3600000 + +m[2] * 60000 + +m[3] * 1000 + +m[4];
  }

  for (const line of text.split('\n')) {
    const ms = extractMs(line);
    if (ms === null) continue;
    if (startMs === null) startMs = ms;
    const t = (ms - startMs) / 1000;

    // 9A: applyMulti9A が出力するデコード済みログ行から取得
    const cfm = line.match(/\[9A\] CF=.* ibat=([0-9.-]+)A vbat=([0-9.-]+)V/);
    if (cfm) {
      const ibat = parseFloat(cfm[1]);
      const vbat = parseFloat(cfm[2]);
      ds.vbat.push({ x: t, y: vbat });
      ds.ibat.push({ x: t, y: ibat });
      ds.pbat.push({ x: t, y: +(vbat * ibat / 1000).toFixed(2) });
      continue;
    }

    // シングルフレームPID: [ok ] ← 行の生フレームをデコード
    const okm = line.match(/\[ok \] ← (.+)/);
    if (!okm) continue;
    const raw = okm[1].trim().toUpperCase();

    // 2920 マルチフレーム応答 → フロー用フィールド + POWERチャート
    if (raw.includes('622920')) {
      const full = reassemble2920(raw);
      const f = compute2920(full);
      if (f) {
        const dispMode = updateStableMode(f.mode);
        ds.pdrive.push({ x: t, y: +f.pdrive.toFixed(2) });
        ds.peng.push({   x: t, y: +f.peng.toFixed(2) });
        ds.pgen.push({   x: t, y: +f.pgen.toFixed(2) });
        ds.pbat20.push({ x: t, y: +f.pbat.toFixed(2) });
        ds.mode.push({   x: t, y: f.mode });
        ds.speed.push({  x: t, y: f.vsp });
        ds.rpm.push({    x: t, y: Math.round(f.engRpm) });
        ds.flow.push({ t, dispMode, ...f, soc: lastSoc });
        continue;
      }
    }

    const last = {};
    for (const tok of raw.split(/\s+/)) {
      if (tok.startsWith('410C') && tok.length >= 8) {
        const a = parseInt(tok.slice(4,6), 16), b = parseInt(tok.slice(6,8), 16);
        if (!isNaN(a+b)) last.rpm = Math.round((256*a+b)/4);
      } else if (tok.startsWith('410D') && tok.length >= 6) {
        const a = parseInt(tok.slice(4,6), 16);
        if (!isNaN(a)) last.speed = a;
      } else if (tok.startsWith('415B') && tok.length >= 6) {
        const a = parseInt(tok.slice(4,6), 16);
        if (!isNaN(a)) last.soc = +(100*a/255).toFixed(1);
      } else if (tok.startsWith('4142') && tok.length >= 8) {
        const a = parseInt(tok.slice(4,6), 16), b = parseInt(tok.slice(6,8), 16);
        if (!isNaN(a+b)) last.sysv = +((256*a+b)/1000).toFixed(2);
      } else if (tok.startsWith('4167') && tok.length >= 8) {
        const bitmap = parseInt(tok.slice(4,6), 16), s1 = parseInt(tok.slice(6,8), 16);
        if (!isNaN(bitmap) && (bitmap & 0x01)) last.engTemp = s1 - 40;
      } else if (tok.startsWith('413C') && tok.length >= 8) {
        const a = parseInt(tok.slice(4,6), 16), b = parseInt(tok.slice(6,8), 16);
        if (!isNaN(a+b)) last.catTemp = +((256*a+b)/10 - 40).toFixed(1);
      } else if (tok.startsWith('4168') && tok.length >= 8) {
        const bitmap = parseInt(tok.slice(4,6), 16), s1 = parseInt(tok.slice(6,8), 16);
        if (!isNaN(bitmap) && (bitmap & 0x01)) last.intTemp = s1 - 40;
      }
    }
    if (last.soc != null) lastSoc = last.soc;
    for (const [k, v] of Object.entries(last)) ds[k].push({ x: t, y: v });
  }
  return ds;
}

function emptyDs() {
  return {
    speed: [], rpm: [],
    vbat: [], ibat: [], pbat: [],
    soc: [], sysv: [],
    engTemp: [], catTemp: [], intTemp: [],
    // 2920由来（POWERチャート + フロー再生）
    pdrive: [], peng: [], pgen: [], pbat20: [], mode: [],
    flow: []
  };
}

/* ── チャート描画 ─────────────────────────────────────────── */
const C = {
  speed:   '#00ffcc', rpm:     '#4488ff',
  vbat:    '#ff6688', ibat:    '#88ffaa', pbat: '#ffaa00',
  soc:     '#00ccff', sysv:    '#cc88ff',
  engTemp: '#ff8844', catTemp: '#ff4444', intTemp: '#44aaff',
  pdrive:  '#ffb347', peng: '#ff6644', pgen: '#00e5ff', pbat20: '#c9a0ff', mode: '#8899aa'
};

const Y_WIDTH = 55;

function scaleOpt(label, color, pos = 'left', min, max) {
  return {
    type: 'linear', position: pos,
    grid:  { color: pos === 'left' ? '#1a3050' : 'transparent' },
    ticks: { color, font: { size: 10 } },
    title: { display: true, text: label, color, font: { size: 10 } },
    afterFit: s => { s.width = Y_WIDTH; },
    ...(min != null ? { min } : {}),
    ...(max != null ? { max } : {}),
  };
}

function baseCfg() {
  return {
    type: 'scatter',
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
      elements: {
        point: { radius: 0 },
        line:  { borderWidth: 1.5, tension: 0 }
      },
      scales: {
        x: {
          type: 'linear',
          grid:  { color: '#1a3050' },
          ticks: { color: '#607090', font: { size: 10 } },
          title: { display: true, text: 's', color: '#607090', font: { size: 10 } }
        }
      }
    }
  };
}

function makeToggles(containerId, chartKey, defs, onToggle) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  defs.forEach(({ label, color }, i) => {
    const btn = document.createElement('button');
    btn.className = 'toggle-btn';
    btn.textContent = label;
    btn.style.color = color;
    btn.addEventListener('click', () => {
      const ch = charts[chartKey];
      const ds = ch.data.datasets[i];
      ds.hidden = !ds.hidden;
      btn.classList.toggle('off', !!ds.hidden);
      if (onToggle) onToggle(ch);
      ch.update();
    });
    el.appendChild(btn);
  });
}

function syncAxesLabels(chart, axisIds) {
  for (const axisId of axisIds) {
    const units = chart.data.datasets
      .filter(d => d.yAxisID === axisId && !d.hidden)
      .map(d => d.label.match(/\((.+)\)$/)?.[1] ?? '')
      .filter(Boolean);
    chart.options.scales[axisId].title.text = units.join(' / ');
  }
}

function destroyAll() {
  for (const [k, ch] of Object.entries(charts)) { ch.destroy(); delete charts[k]; }
}

function render(ds, filename, fmt) {
  destroyAll();

  const allPts = [...ds.speed, ...ds.vbat, ...ds.rpm, ...ds.soc, ...ds.engTemp];
  const duration = allPts.reduce((m, p) => Math.max(m, p.x), 0);

  document.getElementById('dropZone').style.display = 'none';
  document.getElementById('charts').style.display = 'block';
  document.getElementById('changeFileBtn').style.display = 'inline';

  document.getElementById('fileInfo').innerHTML = [
    `<span>${filename}</span>`,
    `<span>形式: <b>${fmt === 'csv' ? 'データログ' : 'デバッグログ'}</b></span>`,
    `<span>時間: <b>${duration.toFixed(0)} s</b></span>`,
    ds.speed.length   ? `<span>Speed: <b>${ds.speed.length}点</b></span>`     : '',
    ds.rpm.length     ? `<span>RPM: <b>${ds.rpm.length}点</b></span>`         : '',
    ds.vbat.length    ? `<span>VBAT: <b>${ds.vbat.length}点</b></span>`       : '',
    ds.soc.length     ? `<span>SOC: <b>${ds.soc.length}点</b></span>`         : '',
    ds.sysv.length    ? `<span>SysV: <b>${ds.sysv.length}点</b></span>`       : '',
    ds.engTemp.length ? `<span>EngTemp: <b>${ds.engTemp.length}点</b></span>` : '',
    ds.catTemp.length ? `<span>CatTemp: <b>${ds.catTemp.length}点</b></span>` : '',
    ds.intTemp.length ? `<span>IntTemp: <b>${ds.intTemp.length}点</b></span>` : '',
  ].join('');

  /* --- Speed / RPM --- */
  {
    const cfg = baseCfg();
    cfg.data = {
      datasets: [
        { label: 'Speed (km/h)', data: ds.speed, showLine: true, borderColor: C.speed, yAxisID: 'y',  fill: false },
        { label: 'RPM',          data: ds.rpm,   showLine: true, borderColor: C.rpm,   yAxisID: 'y2', fill: false },
      ]
    };
    cfg.options.scales.y  = scaleOpt('km/h', C.speed, 'left',  0);
    cfg.options.scales.y2 = scaleOpt('rpm',  C.rpm,   'right', 0);
    charts.vehicle = new Chart(document.getElementById('cVehicle'), cfg);
    makeToggles('togVehicle', 'vehicle', [
      { label: 'Speed (km/h)', color: C.speed },
      { label: 'RPM',          color: C.rpm   },
    ]);
  }

  /* --- Battery: Power / SOC / VBAT / IBAT --- */
  {
    const battDefs = [
      { label: 'Power (kW)', data: ds.pbat, color: C.pbat, axis: 'y'  },
      { label: 'IBAT (A)',   data: ds.ibat, color: C.ibat, axis: 'y'  },
      { label: 'SOC (%)',    data: ds.soc,  color: C.soc,  axis: 'y2' },
      { label: 'VBAT (V)',   data: ds.vbat, color: C.vbat, axis: 'y2' },
    ];
    const UNITS = { 'Power (kW)': 'kW', 'SOC (%)': '%', 'VBAT (V)': 'V', 'IBAT (A)': 'A' };
    const cfg = baseCfg();
    cfg.data = {
      datasets: battDefs.map(d => ({
        label: d.label, data: d.data, showLine: true,
        borderColor: d.color, yAxisID: d.axis, fill: false,
      }))
    };
    cfg.options.scales.y = {
      type: 'linear', position: 'left',
      grid:  { color: '#1a3050' },
      ticks: { color: '#607090', font: { size: 10 } },
      title: { display: true, text: '', color: '#607090', font: { size: 10 } },
      afterFit: s => { s.width = Y_WIDTH; },
    };
    cfg.options.scales.y2 = {
      type: 'linear', position: 'right',
      grid:  { color: 'transparent' },
      ticks: { color: '#607090', font: { size: 10 } },
      title: { display: true, text: '', color: '#607090', font: { size: 10 } },
      afterFit: s => { s.width = Y_WIDTH; },
    };
    cfg.options.plugins.tooltip = {
      mode: 'index', intersect: false,
      callbacks: {
        label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} ${UNITS[ctx.dataset.label] ?? ''}`
      }
    };
    charts.battery = new Chart(document.getElementById('cBattery'), cfg);
    syncAxesLabels(charts.battery, ['y', 'y2']);
    makeToggles('togBattery', 'battery',
      battDefs.map(d => ({ label: d.label, color: d.color })),
      ch => syncAxesLabels(ch, ['y', 'y2']));
  }

  /* --- Power (2920由来。データがある場合のみ) --- */
  document.getElementById('cardPower').style.display = ds.pdrive.length ? 'block' : 'none';
  if (ds.pdrive.length) {
    const powDefs = [
      { label: 'P_wheel (kW)', data: ds.pdrive, color: C.pdrive, axis: 'y'  },
      { label: 'P_eng (kW)',   data: ds.peng,   color: C.peng,   axis: 'y'  },
      { label: 'P_gen (kW)',   data: ds.pgen,   color: C.pgen,   axis: 'y'  },
      { label: 'P_bat (kW)',   data: ds.pbat20, color: C.pbat20, axis: 'y'  },
      { label: 'mode',         data: ds.mode,   color: C.mode,   axis: 'y2', step: true },
    ];
    const cfg = baseCfg();
    cfg.data = {
      datasets: powDefs.map(d => ({
        label: d.label, data: d.data, showLine: true,
        borderColor: d.color, yAxisID: d.axis, fill: false,
        stepped: d.step ? 'before' : false,
        borderWidth: d.step ? 1 : 1.5,
      }))
    };
    cfg.options.scales.y  = scaleOpt('kW', C.pdrive, 'left');
    cfg.options.scales.y2 = scaleOpt('mode', C.mode, 'right', 0, 80);
    cfg.options.scales.y2.ticks.stepSize = 10;
    charts.power = new Chart(document.getElementById('cPower'), cfg);
    makeToggles('togPower', 'power', powDefs.map(d => ({ label: d.label, color: d.color })));
  }

  /* --- Temperature (データがある場合のみ表示) --- */
  const hasTemp = ds.engTemp.length || ds.catTemp.length || ds.intTemp.length;
  document.getElementById('cardTemp').style.display = hasTemp ? 'block' : 'none';
  if (hasTemp) {
    const tempDefs = [
      { label: 'Eng Temp (°C)', data: ds.engTemp, color: C.engTemp, axis: 'y'  },
      { label: 'Cat Temp (°C)', data: ds.catTemp, color: C.catTemp, axis: 'y2' },
      { label: 'Int Temp (°C)', data: ds.intTemp, color: C.intTemp, axis: 'y'  },
    ];
    const cfg = baseCfg();
    cfg.data = {
      datasets: tempDefs.map(d => ({
        label: d.label, data: d.data, showLine: true,
        borderColor: d.color, yAxisID: d.axis, fill: false,
      }))
    };
    // 左軸: Eng/Int Temp (0~120°C)  右軸: Cat Temp (0~900°C)
    cfg.options.scales.y  = scaleOpt('°C', C.engTemp, 'left',  -20, 120);
    cfg.options.scales.y2 = scaleOpt('°C', C.catTemp, 'right', 0,   900);
    charts.temp = new Chart(document.getElementById('cTemp'), cfg);
    makeToggles('togTemp', 'temp', tempDefs.map(d => ({ label: d.label, color: d.color })));
  }

  /* --- SysV (データがある場合のみ表示) --- */
  document.getElementById('cardSysv').style.display = ds.sysv.length ? 'block' : 'none';
  if (ds.sysv.length) {
    const cfg = baseCfg();
    cfg.data = {
      datasets: [
        { label: 'SysV (V)', data: ds.sysv, showLine: true, borderColor: C.sysv, yAxisID: 'y', fill: false }
      ]
    };
    cfg.options.scales.y = scaleOpt('V', C.sysv, 'left');
    charts.sysv = new Chart(document.getElementById('cSysv'), cfg);
    makeToggles('togSysv', 'sysv', [{ label: 'SysV (V)', color: C.sysv }]);
  }

  /* --- Flow playback (2920フレームがある場合のみ) --- */
  // 先頭のSOC欠損(初回015B以前)を最初の既知SOCで補完
  const firstSoc = ds.flow.find(f => !isNaN(f.soc));
  if (firstSoc) for (const f of ds.flow) { if (isNaN(f.soc)) f.soc = firstSoc.soc; else break; }
  window.__cur = null;
  flowInit(ds.flow);
}
