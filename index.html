<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>FL4 OBD MONITOR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#070b0f;color:#c8d8e8;font-family:'Courier New',monospace;min-height:100vh;}
.app{width:100%;margin:0;padding:0 6px 8px;}

/* HEADER — コントロールエリア（下部） */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:8px 0 6px;border-top:1px solid #1a2a3a;border-bottom:none;margin-bottom:6px;margin-top:4px;}
.logo{font-size:11px;letter-spacing:3px;color:#3a8aff;font-weight:bold;}
.hdr-r{display:flex;align-items:center;gap:7px;}
.dot{width:9px;height:9px;border-radius:50%;background:#1e2e3e;
  border:1.5px solid #2a4a6a;transition:all .4s;}
.dot.on {background:#00ff88;border-color:#00cc66;box-shadow:0 0 7px #00ff8860;}
.dot.chk{background:#ffaa00;border-color:#cc8800;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stt{font-size:10px;letter-spacing:1px;color:#2a5a7a;}

/* ROTATE BTN */
.rot-btn{padding:2px 8px;background:#0d1520;border:1px solid #1a3a5a;
  border-radius:4px;color:#2a5a7a;font-family:'Courier New',monospace;
  font-size:9px;cursor:pointer;transition:all .15s;letter-spacing:1px;}
.rot-btn:hover{border-color:#4a9eff;color:#4a9eff;}
.rot-btn.active{border-color:#ffaa00;color:#ffaa00;}

/* LOG */
.log-wrap{position:relative;margin-bottom:8px;}
.log{background:#040810;border:1px solid #1a2a3a;border-radius:6px;
  padding:5px 9px 5px 9px;font-size:10px;color:#2a6a4a;height:60px;
  overflow-y:auto;line-height:1.7;}
.log .e {color:#cc3333;}
.log .ok{color:#22cc77;}
.log .tx{color:#3377cc;}
.log-btn{position:absolute;top:4px;right:5px;
  padding:2px 7px;background:#0d1e30;border:1px solid #2a4a6a;
  border-radius:4px;color:#3a7aaa;font-family:'Courier New',monospace;
  font-size:9px;letter-spacing:1px;cursor:pointer;transition:all .15s;z-index:1;}
.log-btn:hover{border-color:#4a9eff;color:#4a9eff;}
.log-clr{right:54px;}

/* CONNECT */
.conn-btn{width:100%;padding:10px;background:#0d1e30;border:1px solid #2a5a8c;
  border-radius:7px;color:#4a9eff;font-family:'Courier New',monospace;
  font-size:11px;letter-spacing:2px;cursor:pointer;margin-bottom:10px;transition:all .2s;}
.conn-btn:hover  {background:#122840;border-color:#4a9eff;}
.conn-btn:active {transform:scale(.98);}
.conn-btn:disabled{opacity:.35;cursor:not-allowed;}

/* 2x2 ANALOG METERS — 最上部・極力大きく */
.meters-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.meter-card{background:#0a1520;border:1px solid #1a2a3a;border-radius:10px;
  padding:6px 4px 4px;display:flex;flex-direction:column;align-items:center;}
.m-lbl{font-size:9px;letter-spacing:2px;color:#2a5a7a;margin-bottom:2px;}
.m-svg{width:100%;height:auto;}
.m-val{font-size:28px;font-weight:bold;letter-spacing:1px;line-height:1;margin-top:1px;}
.m-unit{font-size:9px;color:#2a5a7a;letter-spacing:1px;margin-top:1px;}
.m-val.rpm{color:#4a9eff;}
.m-val.spd{color:#00ff88;}
.m-val.pwr{color:#ffaa00;}
.m-val.soc{color:#00ffcc;}

/* SUB ROW */
.sub-row{display:flex;justify-content:space-between;background:#0a1520;
  border:1px solid #1a2a3a;border-radius:8px;padding:7px 10px;margin-bottom:8px;}
.sub-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.sub-item .sl{font-size:9px;color:#2a5a7a;letter-spacing:1px;}
.sub-item .sv{font-size:13px;font-weight:bold;color:#c8d8e8;}
.sub-item .sv.cur{color:#cc44ff;}

.demo-note{text-align:center;font-size:9px;color:#1a3a5a;letter-spacing:1px;padding:4px 0;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#040810;}
::-webkit-scrollbar-thumb{background:#1a3a5a;border-radius:2px;}

/* 2x2 ANALOG METERS */
.meters-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.meter-card{background:#0a1520;border:1px solid #1a2a3a;border-radius:10px;
  position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;}
.m-svg{position:absolute;top:0;left:0;width:100%;height:100%;}

/* ── LANDSCAPE MODE: メーターカードだけ90度回転 ─────────── */
body.landscape .meter-card {
  transform: rotate(90deg);
}</style>
</head>
<body>
<div class="app">

<!-- 2x2 ANALOG METERS -->
<div class="meters-grid">

  <!-- RPM -->
  <div class="meter-card">
    <svg class="m-svg" viewBox="0 0 200 200" id="svgRpm">
      <defs>
        <linearGradient id="gRpm" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#1a5aff"/>
          <stop offset="100%" stop-color="#4a9eff"/>
        </linearGradient>
      </defs>
      <!-- ラベル -->
      <text x="100" y="18" text-anchor="middle" fill="#2a5a7a" font-size="10" font-family="Courier New" letter-spacing="2">ENGINE RPM</text>
      <!-- 目盛り弧 (bg) -->
      <path id="bgRpm" fill="none" stroke="#1a2a3a" stroke-width="10" stroke-linecap="round"/>
      <!-- 値弧 -->
      <path id="arcRpm" fill="none" stroke="url(#gRpm)" stroke-width="10" stroke-linecap="round"/>
      <!-- インジケーターバー (半径方向) -->
      <line id="barRpm" stroke="#4a9eff" stroke-width="4" stroke-linecap="round"/>
      <!-- デジタル値 — 円の直径（最下部）付近に大きく -->
      <text id="valRpm" x="100" y="105" dominant-baseline="middle" text-anchor="middle" fill="#4a9eff" font-size="52" font-weight="bold" font-family="Courier New">0</text>
      <!-- 単位 -->
      <text x="100" y="133" text-anchor="middle" fill="#2a5a7a" font-size="11" font-family="Courier New" letter-spacing="1">rpm</text>
      <!-- スケール -->
      <text x="22" y="178" text-anchor="middle" fill="#1e3a5a" font-size="10" font-family="Courier New">0</text>
      <text x="178" y="178" text-anchor="middle" fill="#1e3a5a" font-size="10" font-family="Courier New">8k</text>
    </svg>
  </div>

  <!-- SPEED -->
  <div class="meter-card">
    <svg class="m-svg" viewBox="0 0 200 200" id="svgSpd">
      <defs>
        <linearGradient id="gSpd" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00aa55"/>
          <stop offset="100%" stop-color="#00ff88"/>
        </linearGradient>
      </defs>
      <text x="100" y="18" text-anchor="middle" fill="#2a5a7a" font-size="10" font-family="Courier New" letter-spacing="2">SPEED</text>
      <path id="bgSpd" fill="none" stroke="#1a2a3a" stroke-width="10" stroke-linecap="round"/>
      <path id="arcSpd" fill="none" stroke="url(#gSpd)" stroke-width="10" stroke-linecap="round"/>
      <line id="barSpd" stroke="#00ff88" stroke-width="4" stroke-linecap="round"/>
      <text id="valSpd" x="100" y="105" dominant-baseline="middle" text-anchor="middle" fill="#00ff88" font-size="52" font-weight="bold" font-family="Courier New">0</text>
      <text x="100" y="133" text-anchor="middle" fill="#2a5a7a" font-size="11" font-family="Courier New" letter-spacing="1">km/h</text>
      <text x="22" y="178" text-anchor="middle" fill="#1e3a5a" font-size="10" font-family="Courier New">0</text>
      <text x="178" y="178" text-anchor="middle" fill="#1e3a5a" font-size="10" font-family="Courier New">180</text>
    </svg>
  </div>

  <!-- BATTERY PWR -->
  <div class="meter-card">
    <svg class="m-svg" viewBox="0 0 200 200" id="svgPwr">
      <defs>
        <linearGradient id="gPwrP" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#886600"/>
          <stop offset="100%" stop-color="#ffaa00"/>
        </linearGradient>
        <linearGradient id="gPwrN" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#cc44ff"/>
          <stop offset="100%" stop-color="#7722aa"/>
        </linearGradient>
      </defs>
      <text x="100" y="18" text-anchor="middle" fill="#2a5a7a" font-size="10" font-family="Courier New" letter-spacing="2">BATTERY PWR</text>
      <path id="bgPwr" fill="none" stroke="#1a2a3a" stroke-width="10" stroke-linecap="round"/>
      <!-- 負側弧(充電=紫) -->
      <path id="arcPwrN" fill="none" stroke="url(#gPwrN)" stroke-width="10" stroke-linecap="round"/>
      <!-- 正側弧(放電=橙) -->
      <path id="arcPwrP" fill="none" stroke="url(#gPwrP)" stroke-width="10" stroke-linecap="round"/>
      <!-- 中央マーク -->
      <line id="centerPwr" stroke="#3a5a7a" stroke-width="2" stroke-linecap="round"/>
      <line id="barPwr" stroke="#ffaa00" stroke-width="4" stroke-linecap="round"/>
      <text id="valPwr" x="100" y="105" dominant-baseline="middle" text-anchor="middle" fill="#ffaa00" font-size="48" font-weight="bold" font-family="Courier New">0.0</text>
      <text x="100" y="133" text-anchor="middle" fill="#2a5a7a" font-size="11" font-family="Courier New" letter-spacing="1">kW</text>
      <text x="22" y="180" text-anchor="middle" fill="#2a3a1a" font-size="10" font-family="Courier New">-50</text>
      <text x="100" y="186" text-anchor="middle" fill="#2a3a1a" font-size="10" font-family="Courier New">0</text>
      <text x="178" y="180" text-anchor="middle" fill="#2a3a1a" font-size="10" font-family="Courier New">+50</text>
    </svg>
  </div>

  <!-- SOC -->
  <div class="meter-card">
    <svg class="m-svg" viewBox="0 0 200 200" id="svgSoc">
      <defs>
        <linearGradient id="gSoc" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#cc4400"/>
          <stop offset="40%"  stop-color="#ffaa00"/>
          <stop offset="100%" stop-color="#00ffcc"/>
        </linearGradient>
      </defs>
      <text x="100" y="18" text-anchor="middle" fill="#2a5a7a" font-size="10" font-family="Courier New" letter-spacing="2">STATE OF CHARGE</text>
      <path id="bgSoc" fill="none" stroke="#1a2a3a" stroke-width="10" stroke-linecap="round"/>
      <path id="arcSoc" fill="none" stroke="url(#gSoc)" stroke-width="10" stroke-linecap="round"/>
      <line id="barSoc" stroke="#00ffcc" stroke-width="4" stroke-linecap="round"/>
      <text id="valSoc" x="100" y="105" dominant-baseline="middle" text-anchor="middle" fill="#00ffcc" font-size="52" font-weight="bold" font-family="Courier New">--</text>
      <text x="100" y="133" text-anchor="middle" fill="#2a5a7a" font-size="11" font-family="Courier New" letter-spacing="1">%</text>
      <text x="22" y="178" text-anchor="middle" fill="#1e3a2a" font-size="10" font-family="Courier New">0</text>
      <text x="178" y="178" text-anchor="middle" fill="#1e3a2a" font-size="10" font-family="Courier New">100</text>
    </svg>
  </div>

</div>

<!-- SUB ROW: VBAT / CURRENT / SYS V / RUNTIME -->
<div class="sub-row">
  <div class="sub-item">
    <span class="sl">VBAT</span>
    <span class="sv" id="subVbat">--.- <small style="font-size:8px;color:#2a5a7a">V</small></span>
  </div>
  <div class="sub-item">
    <span class="sl">CURRENT</span>
    <span class="sv cur" id="subCur">--.- <small style="font-size:8px;color:#2a5a7a">A</small></span>
  </div>
  <div class="sub-item">
    <span class="sl">SYS V</span>
    <span class="sv" id="subSysv">--.- <small style="font-size:8px;color:#2a5a7a">V</small></span>
  </div>
  <div class="sub-item">
    <span class="sl">RUNTIME</span>
    <span class="sv" id="subTime">--:--:--</span>
  </div>
</div>

<!-- CONTROLS: 接続・ログ・DEMO -->
<div class="hdr">
  <div class="logo">FL4 OBD MONITOR</div>
  <div class="hdr-r">
    <button class="rot-btn" id="rotBtn" onclick="toggleLandscape()">⟳ 横</button>
    <span class="stt" id="sttTxt">DISCONNECTED</span>
    <div class="dot" id="dot"></div>
  </div>
</div>

<button class="conn-btn" id="connBtn" onclick="toggleConnect()">[ BLUETOOTH 接続 ]</button>

<div class="log-wrap">
  <div class="log" id="logBox">
    <span style="color:#1a5a3a">▶ Web Bluetooth 準備完了 — Chrome + HTTPS必須</span><br>
  </div>
  <button class="log-btn log-clr" onclick="clearLog()">CLR</button>
  <button class="log-btn" onclick="downloadLog()">LOG↓</button>
</div>

<div style="display:flex;gap:6px;margin-bottom:0;">
  <button class="conn-btn" id="demoBtn" onclick="toggleDemo()" style="background:#0d1520;border-color:#1a3a5a;color:#2a5a7a;font-size:10px;">[ DEMO ]</button>
</div>
</div><!-- /app -->

<script>
// ─── Log (全件バッファ保持 + ダウンロード) ───────────────
// ※ onRx より前に定義する必要がある
const logBuffer = [];

function log(msg, cls) {
  const now = new Date();
  const ts = now.toISOString().slice(11, 23);
  logBuffer.push({ ts, cls: cls || '', msg });
  const box = document.getElementById('logBox');
  const s = document.createElement('span');
  if (cls) s.className = cls;
  s.textContent = '[' + ts + '] ' + msg;
  box.appendChild(s);
  box.appendChild(document.createElement('br'));
  box.scrollTop = box.scrollHeight;
  while (box.children.length > 200) {
    box.removeChild(box.firstChild);
    box.removeChild(box.firstChild);
  }
}

function downloadLog() {
  if (logBuffer.length === 0) { alert('ログがありません'); return; }
  const lines = logBuffer.map(e => `[${e.ts}] [${(e.cls||'   ').padEnd(3)}] ${e.msg}`);
  const text = 'FL4 OBD MONITOR LOG\n' +
    'Generated: ' + new Date().toISOString() + '\n' +
    '='.repeat(60) + '\n' + lines.join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'fl4obd_' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function clearLog() {
  logBuffer.length = 0;
  const box = document.getElementById('logBox');
  box.innerHTML = '<span style="color:#1a5a3a">▶ ログクリア</span><br>';
}

// ─── SVGメーター描画ヘルパー ──────────────────────────────
// 中心(cx,cy)、半径r、開始角deg_start〜終了角deg_end の弧パスを返す
// 角度は12時=0、時計回り正
const CX = 100, CY = 105, R = 72;
const DEG_START = -140, DEG_END = 140; // 280°弧

function deg2rad(d) { return d * Math.PI / 180; }

function arcPoint(deg) {
  const r = deg2rad(deg - 90); // SVGはY下向きなので-90補正
  return { x: CX + R * Math.cos(r), y: CY + R * Math.sin(r) };
}

function arcPath(deg1, deg2) {
  const p1 = arcPoint(deg1), p2 = arcPoint(deg2);
  const span = deg2 - deg1;
  const large = span > 180 ? 1 : 0;
  return `M${p1.x.toFixed(2)},${p1.y.toFixed(2)} A${R},${R} 0 ${large},1 ${p2.x.toFixed(2)},${p2.y.toFixed(2)}`;
}

// 弧の総長さ (280° / 360° × 2πR)
const ARC_LEN = (280 / 360) * 2 * Math.PI * R;
const ARC_HALF = ARC_LEN / 2;

// 背景弧を初期化
function initBgArc(id) {
  const el = document.getElementById(id);
  el.setAttribute('d', arcPath(DEG_START, DEG_END));
}
['bgRpm','bgSpd','bgPwr','bgSoc'].forEach(initBgArc);

// 値弧: ratio 0〜1 で左端から右端へ
function setArc(id, ratio) {
  ratio = Math.max(0, Math.min(1, ratio));
  const deg = DEG_START + ratio * 280;
  const el = document.getElementById(id);
  if (ratio === 0) { el.setAttribute('d', `M${arcPoint(DEG_START).x},${arcPoint(DEG_START).y}`); return; }
  el.setAttribute('d', arcPath(DEG_START, deg));
}

// 双極値弧: ratio -1〜+1、中央(deg=0°相当)から左右に伸びる
function setBiArc(idP, idN, idBar, idVal, ratio, colP, colN) {
  ratio = Math.max(-1, Math.min(1, ratio));
  const center = DEG_START + 140; // 280°の中央 = DEG_START+140
  const deg = center + ratio * 140;
  const pP = document.getElementById(idP);
  const pN = document.getElementById(idN);
  if (ratio >= 0) {
    pP.setAttribute('d', ratio > 0 ? arcPath(center, deg) : `M${arcPoint(center).x},${arcPoint(center).y}`);
    pN.setAttribute('d', `M${arcPoint(center).x},${arcPoint(center).y}`);
    setBar(idBar, deg, colP);
    document.getElementById(idVal).setAttribute('fill', colP);
  } else {
    pN.setAttribute('d', arcPath(deg, center));
    pP.setAttribute('d', `M${arcPoint(center).x},${arcPoint(center).y}`);
    setBar(idBar, deg, colN);
    document.getElementById(idVal).setAttribute('fill', colN);
  }
}

// インジケーターバー: 弧上の点から中心方向に短いバー（半径方向）
function setBar(id, deg, color) {
  const r = deg2rad(deg - 90);
  const cos = Math.cos(r), sin = Math.sin(r);
  const x1 = CX + (R - 10) * cos, y1 = CY + (R - 10) * sin;
  const x2 = CX + (R + 10) * cos, y2 = CY + (R + 10) * sin;
  const el = document.getElementById(id);
  el.setAttribute('x1', x1.toFixed(2)); el.setAttribute('y1', y1.toFixed(2));
  el.setAttribute('x2', x2.toFixed(2)); el.setAttribute('y2', y2.toFixed(2));
  if (color) el.setAttribute('stroke', color);
}

// 中央マーク初期化 (PWR用)
function initCenterMark() {
  const center = DEG_START + 140;
  const r = deg2rad(center - 90);
  const cos = Math.cos(r), sin = Math.sin(r);
  const el = document.getElementById('centerPwr');
  el.setAttribute('x1', (CX + (R-8)*cos).toFixed(2));  el.setAttribute('y1', (CY + (R-8)*sin).toFixed(2));
  el.setAttribute('x2', (CX + (R+8)*cos).toFixed(2));  el.setAttribute('y2', (CY + (R+8)*sin).toFixed(2));
}
initCenterMark();

// ─── Vehicle data ─────────────────────────────────────────
const D = { engRot:0, soc:NaN, vbat:0, ibat:0, pbat:0, vsp:0 };
let systemVolt = 0;
let runTimeBase = 0;
let syncTimeMs  = null;

function getRtSec() {
  if (syncTimeMs === null) return null;
  return runTimeBase + Math.floor((Date.now() - syncTimeMs) / 1000);
}

// ─── Render ───────────────────────────────────────────────
function render() {
  // RPM 0-8000
  const rpmR = Math.max(0, Math.min(D.engRot, 8000)) / 8000;
  setArc('arcRpm', rpmR);
  setBar('barRpm', DEG_START + rpmR * 280, '#4a9eff');
  document.getElementById('valRpm').textContent = Math.round(D.engRot);

  // Speed 0-180
  const spdR = Math.max(0, Math.min(D.vsp, 180)) / 180;
  setArc('arcSpd', spdR);
  setBar('barSpd', DEG_START + spdR * 280, '#00ff88');
  document.getElementById('valSpd').textContent = Math.round(D.vsp);

  // Battery PWR bipolar -50..+50 kW
  const pwrR = Math.max(-1, Math.min(D.pbat / 50, 1));
  setBiArc('arcPwrP', 'arcPwrN', 'barPwr', 'valPwr', pwrR, '#ffaa00', '#cc44ff');
  document.getElementById('valPwr').textContent = D.pbat.toFixed(1);

  // SOC 0-100
  const socValid = !isNaN(D.soc);
  const socR = socValid ? Math.max(0, Math.min(D.soc, 100)) / 100 : 0;
  const nc = !socValid ? '#2a5a7a' : D.soc < 20 ? '#ff4444' : D.soc < 50 ? '#ffaa00' : '#00ffcc';
  setArc('arcSoc', socR);
  setBar('barSoc', DEG_START + socR * 280, nc);
  document.getElementById('barSoc').setAttribute('stroke', nc);
  const socEl = document.getElementById('valSoc');
  socEl.textContent = socValid ? D.soc.toFixed(1) : '--';
  socEl.setAttribute('fill', nc);

  // Sub row
  document.getElementById('subVbat').innerHTML =
    D.vbat ? D.vbat.toFixed(1) + ' <small style="font-size:8px;color:#2a5a7a">V</small>'
           : '--.- <small style="font-size:8px;color:#2a5a7a">V</small>';
  document.getElementById('subSysv').innerHTML =
    systemVolt ? systemVolt.toFixed(1) + ' <small style="font-size:8px;color:#2a5a7a">V</small>'
               : '--.- <small style="font-size:8px;color:#2a5a7a">V</small>';
  const curAbs = Math.abs(D.ibat);
  document.getElementById('subCur').innerHTML =
    (curAbs >= 100 ? D.ibat.toFixed(0) : D.ibat.toFixed(1)) +
    ' <small style="font-size:8px;color:#2a5a7a">A</small>';

  // Runtime
  const rtSec = getRtSec();
  if (rtSec === null) {
    document.getElementById('subTime').textContent = '--:--:--';
  } else {
    const h = Math.floor(rtSec / 3600);
    const m = Math.floor((rtSec % 3600) / 60);
    const s = rtSec % 60;
    document.getElementById('subTime').textContent =
      String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }
}

// ─── ELM327 レスポンスパーサー ────────────────────────────
//
// 【実ログから判明したフォーマット】
//   ATS0を送っているがこのELM327はスペースなし・8バイト固定長で返す。
//   1フレーム = 16文字(hex) = 8バイト固定。複数フレームは連結。
//
//   シングルフレーム例:
//     "410D0055555555"  → [41][0D][00][55][55][55][55] + 末尾パッド
//      └─ SID=0x41, PID=0x0D, data[0]=0x00
//
//   マルチフレーム例(PID 9A):
//     "008 0:419A07004245 1:000D55555555"
//      └─ ELM327独自フォーマット: "バイト数 0:FF行 1:CF行 ..."
//         0:行 → First Frame ペイロード (SID PID d0 d1 d2 d3 d4)
//         1:行 → Consecutive Frame ペイロード (d5 d6 d7 d8 d9 dA dB)
//
// 【取得するPIDと変換式】
//   PID 0x0C  engRot = (A<<8|B) / 4.0        [rpm]
//   PID 0x0D  vsp    = A                      [km/h]
//   PID 0x5B  soc    = A * 100.0 / 255.0      [%]
//   PID 0x1F  runtime= (A<<8|B)               [sec]
//   PID 0x9A  vbat   = (A<<8|B) / 64.0        [V]   ※マルチフレーム
//             ibat   = signed16(C<<8|D) * 0.1 [A]

// スペースなし連結hex文字列を16文字(8バイト)ずつ分割してバイト配列リストに変換
// "410D0055555555410C0000555555" → [[0x41,0x0D,...],[0x41,0x0C,...]]
function splitFrames(hexStr) {
  const frames = [];
  // 16文字 = 8バイト = 1 CAN フレーム
  for (let i = 0; i + 16 <= hexStr.length; i += 16) {
    const chunk = hexStr.slice(i, i + 16);
    const bytes = [];
    for (let j = 0; j < 16; j += 2)
      bytes.push(parseInt(chunk.slice(j, j + 2), 16));
    frames.push(bytes);
  }
  // 末尾に16文字に満たない残りがある場合も処理
  const rem = hexStr.length % 16;
  if (rem >= 4) {
    const chunk = hexStr.slice(hexStr.length - rem);
    const bytes = [];
    for (let j = 0; j + 1 < chunk.length; j += 2)
      bytes.push(parseInt(chunk.slice(j, j + 2), 16));
    frames.push(bytes);
  }
  return frames;
}

// OBD-II Service 01 シングルフレーム応答をデコード
// bytes[0]=0x41, bytes[1]=PID, bytes[2..]=data (0x55はパッド、無視)
function decodeService01(bytes) {
  if (bytes[0] !== 0x41) return;
  const pid  = bytes[1];
  const d    = bytes; // d[2], d[3], ... がデータバイト
  // d[2]以降がデータバイト (スケッチのbuf[3]以降に対応)
  switch (pid) {
    case 0x0C: // engRot = (buf[3]<<8|buf[4]) / 4.0
      D.engRot = ((d[2] << 8) | d[3]) / 4.0; break;
    case 0x0D: // vsp = buf[3]
      D.vsp = d[2]; break;
    case 0x5B: // soc = buf[3] * 100.0 / 255.0
      D.soc = d[2] * 100.0 / 255.0; break;
    case 0x05: // tw = buf[3] - 40.0
      D.tw = d[2] - 40.0; break;
    case 0x3C: // tcat = (buf[3]<<8|buf[4]) / 10.0 - 40.0
      D.tcat = ((d[2] << 8) | d[3]) / 10.0 - 40.0; break;
    case 0x1F: // runtime = buf[3]<<8|buf[4]
      runTimeBase = (d[2] << 8) | d[3];
      syncTimeMs  = Date.now(); break;
    case 0x42: // Control Module Voltage = (A*256+B)/1000 [V]
      systemVolt = ((d[2] << 8) | d[3]) / 1000.0; break;
  }
  D.pbat = D.vbat * D.ibat * 0.001;
}

// PID 9A マルチフレーム処理
// 実ログで確認された問題:
//   FFとCFが">"をまたいで別ブロックに届く場合がある
//   例: ブロックA末尾 "... 0:419A070042BE"
//       ブロックB先頭 "1:00045555555555 ..."
// → pendingFF に FF ペイロードを保存し、次のブロックでCFが来たら結合してデコード

let pendingFF = null; // FFペイロードhex文字列を一時保存

function applyMulti9A(ff_hex, cf_hex) {
  // J1979-DA PID 0x9A: Hybrid/EV Vehicle System Data (6 data bytes A-F)
  // ELM327レスポンス FF: [SID=0x41][PID=0x9A][A][B][C][D]
  //                 CF: [E][F][pad...]
  // Voltage [V] = (256×C + D) / 64
  // Current [A] = signed16(256×E + F) × 0.1

  const ff = [];
  for (let i = 0; i + 1 < ff_hex.length; i += 2)
    ff.push(parseInt(ff_hex.slice(i, i + 2), 16));
  if (ff[0] !== 0x41 || ff[1] !== 0x9A) { pendingFF = null; return; }

  D.vbat = ((ff[4] << 8) | ff[5]) / 64.0;

  if (cf_hex && cf_hex.length >= 4) {
    const cf = [];
    for (let i = 0; i + 1 < cf_hex.length; i += 2)
      cf.push(parseInt(cf_hex.slice(i, i + 2), 16));

    // E=cf[0], F=cf[1] → signed16
    const rawEF = (cf[0] << 8) | cf[1];
    D.ibat = (rawEF >= 0x8000 ? rawEF - 0x10000 : rawEF) * 0.1;
    D.pbat = D.vbat * D.ibat * 0.001;

    // デバッグ: 生値を全部ログに出す
    log('[9A] FF=' + ff_hex +
        ' A=' + ff[2].toString(16).padStart(2,'0') +
        ' B=' + ff[3].toString(16).padStart(2,'0') +
        ' C=' + ff[4].toString(16).padStart(2,'0') +
        ' D=' + ff[5].toString(16).padStart(2,'0'), 'tx');
    log('[9A] CF=' + cf_hex.slice(0,4) +
        ' E=' + cf[0].toString(16).padStart(2,'0') +
        ' F=' + cf[1].toString(16).padStart(2,'0') +
        ' rawEF=0x' + rawEF.toString(16) +
        ' ibat=' + D.ibat.toFixed(1) + 'A' +
        ' vbat=' + D.vbat.toFixed(1) + 'V', 'tx');

    pendingFF = null;
  } else {
    log('[9A] FF only, waiting CF... FF=' + ff_hex, 'tx');
    pendingFF = ff_hex;
  }
}

// 1行から N:hex セグメントを全て抽出して返す
// 戻り値: { segments: {0: hex, 1: hex, ...}, remainderHex: "後続シングル連結hex" }
function extractSegments(line) {
  const segments = {};
  const re = /\b(\d+):([0-9A-Fa-f]+)/g;
  let m, lastEnd = 0;
  while ((m = re.exec(line)) !== null) {
    segments[parseInt(m[1])] = m[2];
    lastEnd = m.index + m[0].length;
  }
  const remainder = line.slice(lastEnd).replace(/\s+/g, '');
  return { segments, remainder };
}

// ELM327の1応答ブロック(">"で区切られた単位)をパース
function parseBlock(block) {
  const lines = block.split(/\r\n|\r|\n/)
    .map(l => l.trim())
    .filter(l => l.length > 0 && l !== '?');

  for (const line of lines) {
    if (/^(SEARCHING|NO DATA|ERROR|UNABLE|BUS)/i.test(line)) continue;
    if (/^[A-Za-z]/.test(line) && !/^4[0-9A-Fa-f]/i.test(line)) continue;

    // N:hex パターンを含む行（マルチフレーム関連）
    if (/\b\d+:[0-9A-Fa-f]/.test(line)) {
      const { segments, remainder } = extractSegments(line);

      if (segments[0]) {
        // FF(0:)がある → FFとCF(1:)を処理
        applyMulti9A(segments[0], segments[1]);
      } else if (segments[1] && pendingFF) {
        // CF(1:)のみ、かつFFが保存済み → 結合してデコード
        applyMulti9A(pendingFF, segments[1]);
      }

      // N:hexの後に続くシングルフレーム連結部分も処理
      if (remainder.length >= 14 && /^[0-9A-Fa-f]+$/.test(remainder)) {
        for (const bytes of splitFrames(remainder)) {
          if (bytes.length >= 3) decodeService01(bytes);
        }
      }
      continue;
    }

    // 純粋なシングルフレーム連結行
    const hex = line.replace(/\s+/g, '');
    if (!/^[0-9A-Fa-f]+$/.test(hex)) continue;
    for (const bytes of splitFrames(hex)) {
      if (bytes.length >= 3) decodeService01(bytes);
    }
  }
}

function onRx(evt) {
  rxBuf += new TextDecoder().decode(evt.target.value);
  const parts = rxBuf.split('>');
  for (let i = 0; i < parts.length - 1; i++) {
    const block = parts[i];
    const preview = block.replace(/[\r\n]+/g, ' ').trim();
    if (preview) log('← ' + preview, 'ok'); // 全文字ログに記録
    parseBlock(block);
  }
  rxBuf = parts[parts.length - 1];
}
// ─── BLE ──────────────────────────────────────────────────
let bleDevice = null, bleChar = null, connected = false;
let rxBuf = '', pollTimer = null, demoTimer = null;

async function sendRaw(s) {
  if (!bleChar) return;
  log('→ ' + s, 'tx');
  await bleChar.writeValue(new TextEncoder().encode(s + '\r'));
}

// ─── ポーリング ───────────────────────────────────────────
// 1サイクルで1PIDずつ順番に送る。ELM327の応答待ちを確実にするため
// タイマーベースではなく1PID送信→待機→次PIDの逐次方式にする。
const CMDS = [
  { pid: '010C', intv: 90  },  // RPM
  { pid: '019A', intv: 110 },  // VBAT+IBAT
  { pid: '010D', intv: 120 },  // Speed
  { pid: '015B', intv: 230 },  // SOC
  { pid: '0142', intv: 500 },  // SYS V (Control Module Voltage) = (A*256+B)/1000 [V]
];
let cmdIdx = 0;
let cmdLastTs = CMDS.map(() => 0);

async function pollLoop() {
  if (!connected) return;

  const now = Date.now();
  // 送信間隔が来ているPIDを1つ選んで送信
  let sent = false;
  for (let i = 0; i < CMDS.length; i++) {
    const idx = (cmdIdx + i) % CMDS.length;
    if (now - cmdLastTs[idx] >= CMDS[idx].intv) {
      cmdLastTs[idx] = now;
      cmdIdx = (idx + 1) % CMDS.length;
      try { await sendRaw(CMDS[idx].pid); } catch(e) { log('✗ send err: '+e.message,'e'); }
      sent = true;
      break;
    }
  }

  // 次のポーリングまでの待機: 送信した場合は応答待ち込みで100ms、なければ20ms
  pollTimer = setTimeout(pollLoop, sent ? 100 : 20);
}

async function initElm() {
  const seq = [
    ['ATZ',            1200],
    ['ATE0',            300],
    ['ATL0',            300],
    ['ATS0',            300],
    ['ATSP0',           500],
    // TA_BATT=0x01 をデフォルトヘッダーとして設定
    ['ATSH18DAF101',    300],
    ['ATFCSH18DAF101',  200],
    ['ATFCSD300000',    200],
    ['ATFCSM1',         200],
  ];
  for (const [c, d] of seq) {
    try { await sendRaw(c); } catch(e) {}
    await new Promise(r => setTimeout(r, d));
  }

  // Runtime(PID 0x1F)をTA_ENG(0x10)で1回だけ取得してからTA_BATTに戻す
  try {
    await sendRaw('ATSH18DAF110');
    await new Promise(r => setTimeout(r, 100));
    await sendRaw('011F');
    await new Promise(r => setTimeout(r, 300));
    // TA_BATTに戻す
    await sendRaw('ATSH18DAF101');
    await new Promise(r => setTimeout(r, 100));
    await sendRaw('ATFCSH18DAF101');
    await new Promise(r => setTimeout(r, 100));
    currentTa = 0x01;
  } catch(e) {}
}

// ─── BLE接続 ─────────────────────────────────────────────
// ELM327 BLEドングルは大きく2種類のサービスUUIDを使う:
//   Type A: 0000fff0-0000-1000-8000-00805f9b34fb  (FFF0/FFF1/FFF2)
//   Type B: e7810a71-73ae-499d-8c15-faa9aef0c3f2  (iOS用ドングルに多い)
// Chromeは optionalServices に短縮UUID(例: 'fff0')を渡すと
// 「bluetooth.com/specifications/gatt/services」のエラーを出すことがある。
// → 必ずフル128bit UUIDで指定する。
// → filters に name/namePrefix を並べ、どれにもマッチしない場合の
//   フォールバックとして acceptAllDevices:true を使う別ルートを用意する。

const SVC_UUIDS = [
  '0000fff0-0000-1000-8000-00805f9b34fb',
  'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
];

async function getBleChar(server) {
  for (const uuid of SVC_UUIDS) {
    try {
      const svc   = await server.getPrimaryService(uuid);
      const chars = await svc.getCharacteristics();
      log('サービス検出: ' + uuid.slice(4, 8), 'ok');

      let notifyChar = null, writeChar = null;
      for (const c of chars) {
        if (c.properties.notify || c.properties.indicate) notifyChar = c;
        if (c.properties.write  || c.properties.writeWithoutResponse) writeChar = c;
      }
      // 一部ドングルは同一キャラクタリスティックで読み書きする
      if (!writeChar && notifyChar) writeChar = notifyChar;
      if (!notifyChar && writeChar) notifyChar = writeChar;

      if (notifyChar) {
        await notifyChar.startNotifications();
        notifyChar.addEventListener('characteristicvaluechanged', onRx);
        log('Notify: ' + notifyChar.uuid.slice(4, 8), 'ok');
      }
      return writeChar;
    } catch(e) {
      // このサービスUUIDは未対応 → 次を試す
    }
  }
  throw new Error('対応サービスが見つかりません (FFF0/E781)');
}

async function toggleConnect() {
  if (connected) { doDisc(); return; }

  if (!navigator.bluetooth) {
    log('✗ Web Bluetooth 非対応', 'e');
    log('✗ Android Chrome + HTTPS(またはlocalhost)が必要です', 'e');
    return;
  }

  setUI('chk');
  log('Bluetoothスキャン中...', 'tx');

  try {
    // フル128bit UUIDで optionalServices を指定
    // filters: よくある名前のドングルを優先
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [
        { name: 'OBDII'    },
        { name: 'ELM327'   },
        { name: 'OBD2'     },
        { namePrefix: 'OBD'    },
        { namePrefix: 'ELM'    },
        { namePrefix: 'IOS'    },
        { namePrefix: 'Vlink'  },
        { namePrefix: 'KONNWEI'},
        { namePrefix: 'iCar'   },
        { namePrefix: 'Carista'},
        { services: ['0000fff0-0000-1000-8000-00805f9b34fb'] },
        { services: ['e7810a71-73ae-499d-8c15-faa9aef0c3f2'] },
      ],
      optionalServices: SVC_UUIDS,
    });

    bleDevice.addEventListener('gattserverdisconnected', () => {
      log('切断されました', 'e');
      doDisc();
    });

    log('接続中: ' + bleDevice.name, 'ok');
    const server = await bleDevice.gatt.connect();
    bleChar = await getBleChar(server);
    if (!bleChar) throw new Error('書き込みキャラクタリスティック未検出');

    stopDemo(); // 接続開始時にデモ停止

    await initElm();
    connected = true;
    setUI('on');
    log('ポーリング開始', 'ok');
    pollLoop();

  } catch (e) {
    log('✗ ' + e.message, 'e');
    setUI('off');
  }
}

function doDisc() {
  clearTimeout(pollTimer);
  connected = false;
  if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
  bleDevice = bleChar = null;
  setUI('off');
}

function setUI(s) {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('sttTxt');
  const btn = document.getElementById('connBtn');
  dot.className = 'dot ' + (s === 'on' ? 'on' : s === 'chk' ? 'chk' : '');
  txt.textContent = s === 'on' ? 'CONNECTED' : s === 'chk' ? 'CONNECTING' : 'DISCONNECTED';
  txt.style.color  = s === 'on' ? '#00cc66' : s === 'chk' ? '#ffaa00' : '#2a5a7a';
  btn.textContent  = s === 'on' ? '[ 切断する ]' : '[ BLUETOOTH 接続 ]';
  btn.disabled     = (s === 'chk');
}

// ─── DEMO ─────────────────────────────────────────────────
let dRpm = 800, dSpd = 0, dTw = 25, dTcat = 120, dSoc = 78;
let demoRunning = false;

function demoTick() {
  dRpm  = Math.max(700,  Math.min(6000, dRpm  + (Math.random() - .45) * 350));
  dSpd  = Math.max(0,    Math.min(160,  dSpd  + (Math.random() - .45) * 12));
  dTw   = Math.min(95,   dTw   + .2);
  dTcat = Math.min(800,  dTcat + (Math.random() - .3) * 15);
  dSoc  = Math.max(20,   Math.min(95, dSoc - Math.random() * 0.04));
  D.engRot = dRpm;
  D.vsp    = dSpd;
  D.soc    = dSoc;
  D.vbat   = 350 + Math.random() * 10;
  D.ibat   = (Math.random() - .4) * 120;
  D.pbat   = D.vbat * D.ibat * 0.001;
  systemVolt = 12.4 + Math.random() * .4;
  // デモ用ランタイム: 初回tickでsync
  if (syncTimeMs === null) { runTimeBase = 0; syncTimeMs = Date.now(); }
}

function startDemo() {
  if (demoTimer) return;
  demoRunning = true;
  document.getElementById('demoBtn').textContent = '[ DEMO 停止 ]';
  document.getElementById('demoBtn').style.color = '#ffaa00';
  document.getElementById('demoBtn').style.borderColor = '#ffaa00';
  demoTimer = setInterval(demoTick, 600);
}

function stopDemo() {
  demoRunning = false;
  clearInterval(demoTimer); demoTimer = null;
  document.getElementById('demoBtn').textContent = '[ DEMO ]';
  document.getElementById('demoBtn').style.color = '#2a5a7a';
  document.getElementById('demoBtn').style.borderColor = '#1a3a5a';
}

function toggleDemo() {
  if (connected) return; // 接続中はデモ不可
  demoRunning ? stopDemo() : startDemo();
}

// ─── 画面回転 ──────────────────────────────────────────────
let isLandscape = false;

function applyOrientation(landscape) {
  isLandscape = landscape;
  document.body.classList.toggle('landscape', landscape);
  const btn = document.getElementById('rotBtn');
  if (landscape) {
    btn.textContent = '⟳ 縦';
    btn.classList.add('active');
  } else {
    btn.textContent = '⟳ 横';
    btn.classList.remove('active');
  }
}

function toggleLandscape() {
  applyOrientation(!isLandscape);
}

// 端末の向きに自動追従
function onOrientationChange() {
  const angle = screen.orientation ? screen.orientation.angle : window.orientation;
  applyOrientation(Math.abs(angle) === 90);
}

if (screen.orientation) {
  screen.orientation.addEventListener('change', onOrientationChange);
} else {
  window.addEventListener('orientationchange', onOrientationChange);
}

// 起動時はデモOFF
setInterval(render, 200);
